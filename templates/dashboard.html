<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛道热度 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
        .track-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .track-item:last-child { border-bottom: none; }
        .track-name { font-weight: 500; color: #333; }
        .heat-badge { padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .heat-high { background: #fff2f0; color: #ff4d4f; }
        .heat-medium { background: #fffbe6; color: #faad14; }
        .heat-low { background: #f6ffed; color: #52c41a; }
        .chart-container { height: 300px; }
        .stat-row { display: flex; gap: 15px; margin-top: 10px; }
        .stat-item { flex: 1; text-align: center; padding: 10px; background: #fafafa; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: 600; color: #333; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 赛道热度 Dashboard</h1>
        <p style="margin-top: 8px; opacity: 0.8;">实时跟踪各赛道热度指数与趋势变化</p>
    </div>
    
    <div class="grid" id="statsGrid">
        <div class="card">
            <h3>📊 热度概览</h3>
            <div id="overviewStats">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>📈 赛道热度排名</h3>
            <div id="trackList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        <div class="card">
            <h3>📉 热度趋势图</h3>
            <div id="trendChart" class="chart-container"></div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>🏆 热度 TOP 3 趋势对比</h3>
            <div id="topChart" class="chart-container"></div>
        </div>
    </div>

    <script>
        let heatData = [];
        
        async function loadHeatData() {
            try {
                const resp = await fetch('/api/market/heat');
                const result = await resp.json();
                if (result.success) {
                    heatData = result.tracks;
                    renderDashboard();
                }
            } catch (e) {
                console.error('Failed to load:', e);
            }
        }
        
        function getHeatLevel(heat) {
            if (heat >= 70) return 'heat-high';
            if (heat >= 30) return 'heat-medium';
            return 'heat-low';
        }
        
        function renderDashboard() {
            // Sort by heat
            const sorted = [...heatData].sort((a, b) => b.heat - a.heat);
            
            // Overview stats
            const totalHeat = heatData.reduce((s, t) => s + t.heat, 0);
            const avgHeat = heatData.length ? (totalHeat / heatData.length).toFixed(1) : 0;
            const activeTracks = heatData.filter(t => t.heat > 0).length;
            
            document.getElementById('overviewStats').innerHTML = `
                <div class="stat-row">
                    <div class="stat-item">
                        <div class="stat-value">${heatData.length}</div>
                        <div class="stat-label">赛道总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${avgHeat}</div>
                        <div class="stat-label">平均热度</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${activeTracks}</div>
                        <div class="stat-label">活跃赛道</div>
                    </div>
                </div>
            `;
            
            // Track list
            document.getElementById('trackList').innerHTML = sorted.map(t => `
                <div class="track-item">
                    <span class="track-name">${t.name}</span>
                    <span class="heat-badge ${getHeatLevel(t.heat)}">${t.heat.toFixed(1)}</span>
                </div>
            `).join('');
            
            // Trend chart
            renderTrendChart(sorted);
            
            // Top 3 chart
            renderTopChart(sorted.slice(0, 3));
        }
        
        function renderTrendChart(tracks) {
            const chart = echarts.init(document.getElementById('trendChart'));
            const series = tracks.map(t => ({
                name: t.name,
                type: 'line',
                data: t.trend,
                smooth: true
            }));
            
            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { type: 'scroll', left: 0, right: 0, bottom: 0 },
                xAxis: { type: 'category', data: ['D-6', 'D-5', 'D-4', 'D-3', 'D-2', 'D-1', 'D0'] },
                yAxis: { type: 'value', name: '热度' },
                series: series,
                grid: { top: 30, bottom: 60, left: 50, right: 20 }
            });
        }
        
        function renderTopChart(topTracks) {
            const chart = echarts.init(document.getElementById('topChart'));
            const series = topTracks.map(t => ({
                name: t.name,
                type: 'line',
                data: t.trend,
                smooth: true,
                areaStyle: { opacity: 0.3 }
            }));
            
            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: topTracks.map(t => t.name) },
                xAxis: { type: 'category', data: ['D-6', 'D-5', 'D-4', 'D-3', 'D-2', 'D-1', 'D0'] },
                yAxis: { type: 'value', name: '热度' },
                series: series,
                grid: { top: 30, bottom: 30, left: 50, right: 20 }
            });
        }
        
        // Auto refresh every 5 minutes
        loadHeatData();
        setInterval(loadHeatData, 5 * 60 * 1000);
        
        // Handle resize
        window.addEventListener('resize', () => {
            echarts.getInstanceByDom(document.getElementById('trendChart'))?.resize();
            echarts.getInstanceByDom(document.getElementById('topChart'))?.resize();
        });
    </script>
</body>
</html>
