<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Template</title>
</head>
<body >
    <h2>{{ code }} 的股票分析列表 {{ data|length }} 条分析记录</h2>
    {# 使用 length 过滤器获取 movies 变量的长度 #}
    <ul class="stock-list">
        {% for record in data %}  {# 迭代 data 变量 #}
        <li> {{ record}} 
        </li>
        {% endfor %}  {# 使用 endfor 标签结束 for 语句 #}
    </ul>
    
    <footer>
        <small>&copy; 2018 <a href="http://helloflask.com/book/3">买股必涨</a></small>
    </footer>
</body>
</html>
