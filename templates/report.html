<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周报生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 20px; }
        .header { background: linear-gradient(135deg, #1890ff 0%, #722ed1 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h3 { color: #333; margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid #1890ff; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        .form-group select, .form-group input { width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: #1890ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #40a9ff; }
        .btn:disabled { background: #d9d9d9; cursor: not-allowed; }
        .track-list { max-height: 400px; overflow-y: auto; }
        .track-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; }
        .track-item:hover { background: #f5f5f5; }
        .track-item.active { background: #e6f7ff; border-left: 3px solid #1890ff; }
        .report-content { min-height: 400px; white-space: pre-wrap; line-height: 1.8; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .export-btns { display: flex; gap: 10px; margin-top: 20px; }
        .export-btn { flex: 1; padding: 10px; border: 1px solid #d9d9d9; background: white; border-radius: 6px; cursor: pointer; }
        .export-btn:hover { border-color: #1890ff; color: #1890ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 周报生成器</h1>
            <p style="margin-top: 8px; opacity: 0.8;">选择赛道，AI 自动生成结构化周报</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h3>选择赛道</h3>
                <div class="track-list" id="trackList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            
            <div class="card">
                <h3>周报内容</h3>
                <div class="form-group">
                    <label>时间范围</label>
                    <select id="timeRange">
                        <option value="本周">本周</option>
                        <option value="上周">上周</option>
                        <option value="本月">本月</option>
                    </select>
                </div>
                <button class="btn" id="generateBtn" onclick="generateReport()">生成周报</button>
                <div id="reportContent" class="report-content">
                    <div class="loading">请选择赛道后点击生成周报</div>
                </div>
                <div class="export-btns" id="exportBtns" style="display:none;">
                    <button class="export-btn" onclick="exportMarkdown()">导出 Markdown</button>
                    <button class="export-btn" onclick="exportText()">导出 TXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tracks = [];
        let selectedTrack = null;
        let currentReport = '';
        
        async function loadTracks() {
            const resp = await fetch('/api/market/heat');
            const result = await resp.json();
            if (result.success) {
                tracks = result.tracks;
                renderTrackList();
            }
        }
        
        function renderTrackList() {
            const html = tracks.map(t => `
                <div class="track-item ${selectedTrack?.id === t.id ? 'active' : ''}" 
                     onclick="selectTrack(${t.id})">
                    <div style="font-weight:500;">${t.name}</div>
                    <div style="font-size:12px;color:#999;">热度: ${t.heat}</div>
                </div>
            `).join('');
            document.getElementById('trackList').innerHTML = html || '<div class="loading">暂无赛道数据</div>';
        }
        
        function selectTrack(id) {
            selectedTrack = tracks.find(t => t.id === id);
            renderTrackList();
        }
        
        async function generateReport() {
            if (!selectedTrack) {
                alert('请先选择赛道');
                return;
            }
            
            const btn = document.getElementById('generateBtn');
            const content = document.getElementById('reportContent');
            btn.disabled = true;
            btn.textContent = '生成中...';
            content.innerHTML = '<div class="loading">AI 正在生成周报，请稍候...</div>';
            
            try {
                const resp = await fetch('/api/report/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        track_id: selectedTrack.id,
                        track_name: selectedTrack.name,
                        time_range: document.getElementById('timeRange').value
                    })
                });
                const result = await resp.json();
                if (result.success) {
                    currentReport = result.report;
                    content.textContent = result.report;
                    document.getElementById('exportBtns').style.display = 'flex';
                } else {
                    content.textContent = '生成失败: ' + (result.error || '未知错误');
                }
            } catch (e) {
                content.textContent = '请求失败: ' + e.message;
            }
            
            btn.disabled = false;
            btn.textContent = '生成周报';
        }
        
        function exportMarkdown() {
            const blob = new Blob([currentReport], {type: 'text/markdown'});
            downloadBlob(blob, `${selectedTrack?.name || '周报'}.md`);
        }
        
        function exportText() {
            const blob = new Blob([currentReport], {type: 'text/plain'});
            downloadBlob(blob, `${selectedTrack?.name || '周报'}.txt`);
        }
        
        function downloadBlob(blob, filename) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        }
        
        loadTracks();
    </script>
</body>
</html>
