prompts:
  stock_article:
    name: "股票分析文章"
    description: "将结构化数据转化为投资分析文章"
    version: 1
    model: "deepseek-reasoner"
    temperature: 1.3
    max_tokens: 2000
    system: "你是专业资深的股票分析师，擅长将数据转化为通俗易懂的投资分析文章。"
    template: |
      基于以下股票分析数据，撰写一篇专业但易懂的投资分析文章。
      要求：1.标题吸引人 2.总结关键信号 3.风险提示 4.简明建议
      以markdown格式输出。

      股票分析数据：
      {{ analysis_data }}

  weekly_report:
    name: "赛道周报生成"
    description: "生成行业周报"
    version: 1
    model: "deepseek-reasoner"
    temperature: 1.3
    max_tokens: 2000
    system: "你是专业资深的行业分析师，擅长撰写结构化的行业周报。"
    template: |
      请生成一份关于【{{ track_name }}】的{{ time_range }}周报，包含以下内容：
      1. 本周热度变化分析
      2. 重要新闻事件摘要（3-5条）
      3. 政策动态
      4. 融资并购情况
      5. 技术/产品进展
      6. 投资建议

      数据来源：{{ news_count }} 条相关新闻

  policy_analysis:
    name: "政策影响分析"
    description: "分析政策对行业的影响"
    version: 1
    model: "deepseek-reasoner"
    temperature: 1.0
    max_tokens: 1000
    system: "你是专业的政策影响分析师。"
    template: |
      请分析以下政策新闻对相关行业的影响：

      {{ content }}
