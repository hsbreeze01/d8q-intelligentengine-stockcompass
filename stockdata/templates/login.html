<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Advice Detail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <h2>登陆</h2>
        <p>If you don't have an account, please register first.</p>
        <a href="/register"><button type="button">Go to Register</button></a>
        <br><br>

        <form method="POST" action="/login">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" maxlength="20" required><br><br>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" maxlength="20" required><br><br>
            
            <button type="submit">login</button>
        </form>
        {% if msg %}
            <p>{{ msg }}</p>
        {% endif %}

</body>
