
{% block title %}更新股票跟踪{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>更新股票跟踪</h2>
    
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}
    
    {% if data %}
    <div class="card">
        <div class="card-body">
            <form action="/tracking/update/{{ data.id }}" method="post">
                <div class="mb-3">
                    <label for="stock_code" class="form-label">股票代码</label>
                    <input type="text" class="form-control" id="stock_code" value="{{ data.stock_code }}" readonly>
                </div>
                <div class="mb-3">
                    <label for="buy_price" class="form-label">买入价格</label>
                    <input type="number" step="0.01" class="form-control" id="buy_price" name="buy_price" value="{{ data.buy_price }}" required>
                </div>
                <div class="mb-3">
                    <label for="buy_amount" class="form-label">买入数量</label>
                    <input type="number" class="form-control" id="buy_amount" name="buy_amount" value="{{ data.buy_amount }}" required>
                </div>
                <div class="mb-3">
                    <label for="buy_date" class="form-label">买入日期</label>
                    <input type="date" class="form-control" id="buy_date" name="buy_date" value="{{ data.buy_date }}" required>
                </div>
                <div class="mb-3">
                    <label for="stop_loss_pct" class="form-label">止损百分比</label>
                    <input type="number" step="0.01" class="form-control" id="stop_loss_pct" name="stop_loss_pct" value="{{ data.stop_loss_pct }}" required>
                </div>
                <div class="mb-3">
                    <label for="current_price" class="form-label">当前价格</label>
                    <input type="number" step="0.01" class="form-control" id="current_price" name="current_price" value="{{ data.current_price }}" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/tracking/list" class="btn btn-secondary">返回列表</a>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
